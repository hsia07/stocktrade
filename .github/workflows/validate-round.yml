name: validate-round

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jsonschema

      - name: Validate round
        run: |
          python ./scripts/validation/validate_round.py --manifest ./manifests/current_round.yaml
          python ./scripts/validation/check_forbidden_changes.py --manifest ./manifests/current_round.yaml
          python ./scripts/validation/check_required_evidence.py --manifest ./manifests/current_round.yaml
          python ./scripts/validation/check_commit_message.py --manifest ./manifests/current_round.yaml
